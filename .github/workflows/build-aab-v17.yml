name: Build AAB (Psyke V17)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version override (for example 17.5.0)"
        required: false
        default: "17.5.0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: android-aab-v17
  cancel-in-progress: true

jobs:
  build-aab:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev libsqlite3-dev \
            libjpeg-dev libfreetype6-dev \
            libbz2-dev liblzma-dev libreadline-dev \
            libncurses5-dev libncursesw5-dev \
            libgl1-mesa-dev libgles2-mesa-dev

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3" pexpect "buildozer==1.5.0" python-for-android

      - name: Build AAB and stage ABB-17.5
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bash Psyke-Android-V17/build_aab_ci.sh

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-aab-v17-${{ github.run_number }}
          path: Psyke-Android-V17/buildozer-aab.log

      - name: Upload AAB artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aab-v17-${{ github.run_number }}
          path: ABB/ABB-17.5.aab

      - name: Verify committed AAB path exists
        if: success()
        run: ls -lh ABB/ABB-17.5.aab

      - name: Commit ABB-17.5 back to main
        if: success()
        run: |
          git checkout -- Psyke-Android-V17/buildozer.spec
          rm -f Psyke-Android-V17/build_info.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ABB/ABB-17.5.aab
          if git diff --cached --quiet; then
            echo "No ABB changes to commit."
            exit 0
          fi
          git commit -m "build: update ABB-17.5 [skip ci]"
          git push origin HEAD:main
