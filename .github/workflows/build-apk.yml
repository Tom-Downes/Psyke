name: Build APK (Psyke V14)

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-apk.yml"
      - "Psyke-Android-14/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: android-apk-v14-debug
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: Psyke-Android-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # python-for-android/Gradle builds require Java 17+ (AGP requirement).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev libsqlite3-dev \
            libjpeg-dev libfreetype6-dev \
            libbz2-dev liblzma-dev libreadline-dev \
            libncurses5-dev libncursesw5-dev \
            libgl1-mesa-dev libgles2-mesa-dev

      - name: Install buildozer (pinned)
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3" pexpect "buildozer==1.5.0"

      - name: Stamp build metadata + bump versionCode
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          from __future__ import annotations
          import datetime as dt
          import os
          import re
          from pathlib import Path

          spec_path = Path("buildozer.spec")
          spec = spec_path.read_text(encoding="utf-8")

          m_ver = re.search(r"(?m)^version\\s*=\\s*(.+?)\\s*$", spec)
          version = (m_ver.group(1).strip() if m_ver else "unknown")

          m_num = re.search(r"(?m)^android\\.numeric_version\\s*=\\s*(\\d+)\\s*$", spec)
          base_numeric = int(m_num.group(1)) if m_num else 1

          run_no = int(os.environ.get("GITHUB_RUN_NUMBER", "0") or "0")
          numeric = base_numeric + run_no

          if m_num:
            spec = re.sub(r"(?m)^android\\.numeric_version\\s*=\\s*\\d+\\s*$",
                          f"android.numeric_version = {numeric}", spec)
          else:
            spec += f"\nandroid.numeric_version = {numeric}\n"
          spec_path.write_text(spec, encoding="utf-8")

          sha = os.environ.get("GITHUB_SHA", "")[:7] or "unknown"
          now = dt.datetime.utcnow().replace(microsecond=0).isoformat() + "Z"
          build_info = (
              '\"\"\"Auto-generated by CI. Do not edit in artifacts.\"\"\"\\n\\n'
              f'APP_VERSION = {version!r}\\n'
              f'BUILD_SHA = {sha!r}\\n'
              f'BUILD_DATE_UTC = {now!r}\\n'
              f'BUILD_RUN = {str(run_no)!r}\\n'
          )
          Path("build_info.py").write_text(build_info, encoding="utf-8")

          print(f"Stamped: version={version} numeric_version={numeric} sha={sha} run={run_no}")
          PY

      - name: Build debug APK (capture log)
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer.log

      - name: Show APK outputs
        if: always()
        run: |
          ls -la bin || true
          sha256sum bin/*.apk 2>/dev/null || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-v14-${{ github.run_number }}
          path: Psyke-Android-14/buildozer.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-v14-${{ github.run_number }}
          path: Psyke-Android-14/bin/*.apk
