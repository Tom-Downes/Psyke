name: Release APK (Psyke V6)

on:
  push:
    tags:
      - "v6.*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: android-apk
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: Psyke-Android-V6

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev libsqlite3-dev \
            libjpeg-dev libfreetype6-dev \
            libbz2-dev liblzma-dev libreadline-dev \
            libncurses5-dev libncursesw5-dev \
            libgl1-mesa-dev libgles2-mesa-dev

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3" pexpect "buildozer==1.5.0"

      - name: Stamp build metadata + bump numeric version
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          from __future__ import annotations
          import datetime as dt
          import os
          import re
          from pathlib import Path

          spec_path = Path("buildozer.spec")
          spec = spec_path.read_text(encoding="utf-8")

          tag = os.environ.get("TAG_NAME", "").strip()
          version = tag[1:] if tag.startswith("v") else "6.0.0"
          run_no = int(os.environ.get("GITHUB_RUN_NUMBER", "0") or "0")
          numeric = 60000 + run_no

          if re.search(r"(?m)^version\s*=", spec):
            spec = re.sub(r"(?m)^version\s*=.*$", f"version = {version}", spec)
          else:
            spec += f"\nversion = {version}\n"

          if re.search(r"(?m)^android\.numeric_version\s*=", spec):
            spec = re.sub(
                r"(?m)^android\.numeric_version\s*=.*$",
                f"android.numeric_version = {numeric}",
                spec,
            )
          else:
            spec += f"\nandroid.numeric_version = {numeric}\n"

          spec_path.write_text(spec, encoding="utf-8")

          sha = os.environ.get("GITHUB_SHA", "")[:7] or "unknown"
          now = dt.datetime.utcnow().replace(microsecond=0).isoformat() + "Z"
          build_info = (
              '"""Auto-generated by CI. Do not edit in artifacts."""\n\n'
              f'APP_VERSION = {version!r}\n'
              f'BUILD_SHA = {sha!r}\n'
              f'BUILD_DATE_UTC = {now!r}\n'
              f'BUILD_RUN = {str(run_no)!r}\n'
          )
          Path("build_info.py").write_text(build_info, encoding="utf-8")
          print(f"Stamped version={version} numeric={numeric} sha={sha} run={run_no}")
          PY

      - name: Build debug APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-v6-${{ github.run_number }}
          path: Psyke-Android-V6/buildozer.log

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-v6-${{ github.run_number }}
          path: Psyke-Android-V6/bin/*.apk

      - name: Publish GitHub Release with APK
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Psyke-Android-V6/bin/*.apk
          generate_release_notes: true
