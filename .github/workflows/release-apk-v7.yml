name: Release APK (Psyke V7)

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-apk-v7.yml"
      - "Psyke-Android-V7/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 7.0.0)"
        required: false
        default: "7.0.0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: Psyke-Android-V7

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev libsqlite3-dev \
            libjpeg-dev libfreetype6-dev \
            libbz2-dev liblzma-dev libreadline-dev \
            libncurses5-dev libncursesw5-dev \
            libgl1-mesa-dev libgles2-mesa-dev

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3" pexpect "buildozer==1.5.0"

      - name: Decode Android keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > psyke-upload.keystore

      - name: Stamp metadata and configure signed release APK
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          INPUT_VERSION: ${{ github.event.inputs.version || '7.0.0' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          python - <<'PY'
          from __future__ import annotations
          import datetime as dt
          import os
          import re
          from pathlib import Path

          spec_path = Path("buildozer.spec")
          spec = spec_path.read_text(encoding="utf-8")

          version = (os.environ.get("INPUT_VERSION") or "").strip() or "7.0.0"
          run_no = int(os.environ.get("GITHUB_RUN_NUMBER", "0") or "0")
          numeric = 70000 + run_no

          def upsert(text: str, key: str, value: str) -> str:
            pattern = rf"(?m)^{re.escape(key)}\s*=.*$"
            line = f"{key} = {value}"
            if re.search(pattern, text):
              return re.sub(pattern, line, text)
            if not text.endswith("\n"):
              text += "\n"
            return text + line + "\n"

          spec = upsert(spec, "version", version)
          spec = upsert(spec, "android.numeric_version", str(numeric))
          spec = upsert(spec, "android.release_artifact", "apk")
          spec = upsert(spec, "android.keystore", "psyke-upload.keystore")
          spec = upsert(spec, "android.keystore_passwd", os.environ["ANDROID_KEYSTORE_PASSWORD"])
          spec = upsert(spec, "android.keyalias", os.environ["ANDROID_KEY_ALIAS"])
          spec = upsert(spec, "android.keyalias_passwd", os.environ["ANDROID_KEY_PASSWORD"])
          spec_path.write_text(spec, encoding="utf-8")

          sha = os.environ.get("GITHUB_SHA", "")[:7] or "unknown"
          now = dt.datetime.utcnow().replace(microsecond=0).isoformat() + "Z"
          build_info = (
              '"""Auto-generated by CI. Do not edit in artifacts."""\n\n'
              f'APP_VERSION = {version!r}\n'
              f'BUILD_SHA = {sha!r}\n'
              f'BUILD_DATE_UTC = {now!r}\n'
              f'BUILD_RUN = {str(run_no)!r}\n'
          )
          Path("build_info.py").write_text(build_info, encoding="utf-8")
          print(f"Stamped version={version} numeric={numeric} sha={sha} run={run_no}")
          PY

      - name: Build APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer-apk.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-apk-v7-${{ github.run_number }}
          path: Psyke-Android-V7/buildozer-apk.log

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-v7-${{ github.run_number }}
          path: Psyke-Android-V7/bin/*.apk

      - name: Publish GitHub Release with APK
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '7.0.0' }}
          name: Psyke V7 ${{ github.event.inputs.version || '7.0.0' }}
          files: Psyke-Android-V7/bin/*.apk
          generate_release_notes: true
