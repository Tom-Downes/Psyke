name: Release APK (Psyke V17)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label"
        required: false
        default: "17.5.0"
      release_tag:
        description: "Git tag"
        required: false
        default: "v17"
      release_name:
        description: "Release title"
        required: false
        default: "Psyke-V17"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: android-apk-v17
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: Psyke-Android-V17
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev libsqlite3-dev \
            libjpeg-dev libfreetype6-dev \
            libbz2-dev liblzma-dev libreadline-dev \
            libncurses5-dev libncursesw5-dev \
            libgl1-mesa-dev libgles2-mesa-dev

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/kivy/buildozer
          pip install legacy-cgi setuptools "Cython<3" pexpect

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > psyke-upload.keystore

      - name: Stamp version
        env:
          VERSION: ${{ github.event.inputs.version || '17.5.0' }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          python - <<'PY'
          import datetime as dt, os, re
          from pathlib import Path

          spec = Path("buildozer.spec").read_text(encoding="utf-8")
          version = os.environ["VERSION"].strip()
          numeric = int(dt.datetime.now(dt.timezone.utc).timestamp())

          def upsert(text, key, value):
              pattern = rf"(?m)^{re.escape(key)}\s*=.*$"
              line = f"{key} = {value}"
              return re.sub(pattern, line, text) if re.search(pattern, text) else text + f"\n{line}\n"

          spec = upsert(spec, "version", version)
          spec = upsert(spec, "android.numeric_version", str(numeric))
          spec = upsert(spec, "android.release_artifact", "apk")
          spec = upsert(spec, "android.keystore", "psyke-upload.keystore")
          spec = upsert(spec, "android.keystore_passwd", os.environ["KEYSTORE_PASSWORD"])
          spec = upsert(spec, "android.keyalias", os.environ["KEY_ALIAS"])
          spec = upsert(spec, "android.keyalias_passwd", os.environ["KEY_PASSWORD"])
          Path("buildozer.spec").write_text(spec, encoding="utf-8")
          print(f"Stamped version={version} numeric={numeric}")
          PY

      - name: Build APK
        env:
          LDFLAGS: -Wl,-z,max-page-size=16384
        run: |
          set -o pipefail
          buildozer -v android release 2>&1 | tee build.log

      - name: Sign and rename APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          APK=$(find bin -name "*.apk" | head -1)
          test -n "$APK" || (echo "No APK found in bin/"; ls bin/ || true; exit 1)
          RELEASE_APK="Psyke-V17.apk"
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort -V | tail -1)
          "$APKSIGNER" sign \
            --ks psyke-upload.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out "$RELEASE_APK" \
            "$APK"
          python verify_page_sizes.py "$RELEASE_APK"
          "$APKSIGNER" verify --verbose --print-certs "$RELEASE_APK"
          echo "RELEASE_APK=$RELEASE_APK" >> "$GITHUB_ENV"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.release_tag || 'v17' }}
          TITLE: ${{ github.event.inputs.release_name || 'Psyke-V17' }}
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --repo "${{ github.repository }}"
          else
            gh release create "$TAG" --title "$TITLE" --notes "Psyke V17 release APK" --repo "${{ github.repository }}"
          fi
          gh release upload "$TAG" "$RELEASE_APK" --clobber --repo "${{ github.repository }}"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-v17-${{ github.run_number }}
          path: Psyke-Android-V17/build.log

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-v17-${{ github.run_number }}
          path: Psyke-Android-V17/${{ env.RELEASE_APK }}
