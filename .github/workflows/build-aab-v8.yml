name: BuildABBV8

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-aab-v8.yml"
      - "Psyke-Android-V8/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version override (for example 8.0.1)"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: android-aab
  cancel-in-progress: true

jobs:
  build-aab-v8:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev libsqlite3-dev \
            libjpeg-dev libfreetype6-dev \
            libbz2-dev liblzma-dev libreadline-dev \
            libncurses5-dev libncursesw5-dev \
            libgl1-mesa-dev libgles2-mesa-dev

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3" pexpect "buildozer==1.5.0"

      - name: Build AAB V8 and stage ABB-V5
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bash Psyke-Android-V8/build_aab_ci.sh

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-aab-v8-${{ github.run_number }}
          path: Psyke-Android-V8/buildozer-aab.log

      - name: Upload AAB artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aab-v8-${{ github.run_number }}
          path: ABB/ABB-V5.aab

      - name: Verify committed AAB path exists
        if: success()
        run: ls -lh ABB/ABB-V5.aab

      - name: Commit ABB-V5 back to main
        if: success()
        run: |
          git checkout -- Psyke-Android-V8/buildozer.spec Psyke-Android-V8/build_info.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ABB/ABB-V5.aab
          if git diff --cached --quiet; then
            echo "No ABB changes to commit."
            exit 0
          fi
          git commit -m "build: update ABB-V5"
          git push origin HEAD:main
