name: Release APK (Psyke V16)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label"
        required: false
        default: "16.7.0"
      release_tag:
        description: "Git tag"
        required: false
        default: "v16.7"
      release_name:
        description: "Release title"
        required: false
        default: "Psyke-v16.7"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: android-apk-v16
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: Psyke-Android-v16

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev libsqlite3-dev \
            libjpeg-dev libfreetype6-dev \
            libbz2-dev liblzma-dev libreadline-dev \
            libncurses5-dev libncursesw5-dev \
            libgl1-mesa-dev libgles2-mesa-dev

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3" pexpect "buildozer==1.5.0"

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > psyke-upload.keystore

      - name: Stamp version and configure build
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '16.7.0' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          python - <<'PY'
          import datetime as dt, os, re
          from pathlib import Path

          spec = Path("buildozer.spec").read_text(encoding="utf-8")
          version = os.environ.get("INPUT_VERSION", "16.7.0").strip()
          numeric = int(dt.datetime.now(dt.timezone.utc).timestamp())

          def upsert(text, key, value):
              pattern = rf"(?m)^{re.escape(key)}\s*=.*$"
              line = f"{key} = {value}"
              return re.sub(pattern, line, text) if re.search(pattern, text) else text + f"\n{line}\n"

          spec = upsert(spec, "version", version)
          spec = upsert(spec, "android.numeric_version", str(numeric))
          spec = upsert(spec, "android.release_artifact", "apk")
          spec = upsert(spec, "android.keystore", "psyke-upload.keystore")
          spec = upsert(spec, "android.keystore_passwd", os.environ["ANDROID_KEYSTORE_PASSWORD"])
          spec = upsert(spec, "android.keyalias", os.environ["ANDROID_KEY_ALIAS"])
          spec = upsert(spec, "android.keyalias_passwd", os.environ["ANDROID_KEY_PASSWORD"])
          Path("buildozer.spec").write_text(spec, encoding="utf-8")
          print(f"Stamped version={version} numeric={numeric}")
          PY

      - name: Build APK
        run: |
          set -o pipefail
          buildozer -v android release 2>&1 | tee build.log

      - name: Find APK
        run: |
          APK=$(find bin -name "*.apk" | head -1)
          test -n "$APK"
          RELEASE_APK="Psyke-v16.7-${{ github.event.inputs.version || '16.7.0' }}.apk"
          cp "$APK" "$RELEASE_APK"
          echo "RELEASE_APK=$RELEASE_APK" >> "$GITHUB_ENV"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.release_tag || 'v16.7' }}
          TITLE: ${{ github.event.inputs.release_name || 'Psyke-v16.7' }}
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --repo "${{ github.repository }}"
          else
            gh release create "$TAG" --title "$TITLE" --notes "Psyke v16.7" --repo "${{ github.repository }}"
          fi

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.release_tag || 'v16.7' }}
        run: |
          gh release upload "$TAG" "$RELEASE_APK" --clobber --repo "${{ github.repository }}"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-v16-${{ github.run_number }}
          path: Psyke-Android-v16/build.log

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-v16-${{ github.run_number }}
          path: Psyke-Android-v16/${{ env.RELEASE_APK }}
